version: '3'

services:
  mongodb:
    image: mongo:latest
    ports:
      - "8081:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  online-learning-app:
    build: .
    ports:
      - "9091:9090"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://admin:admin123@mongodb:27017/onlineLearning?authSource=admin
    restart: on-failure

volumes:
  mongo-data:
